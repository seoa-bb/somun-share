<!doctype html>
<html lang="ko">
<head>

<style>

  .slide{width:100%;max-width:1160px;aspect-ratio:16/9;

  .slide:before{content:"";position:absolute;inset:0;background:radial-gradient(42% 26% at 50% 16%,rgba(216,177,95,.15),rgba(216,177,95,0) 70%);pointer-events:none}
  svg{width:100%;height:100%;display:block;position:relative}
</style>
</head>
<body>

  <text x="580" y="562" text-anchor="middle" fill="#f3ead9" font-size="14.5" font-weight="800">각 모임의 <tspan fill="#e9c485">호스트</tspan> → 협약(혜택 ↔ 단체방문·입소문·새 회원) → <tspan fill="#e9c485">모임 전체로 확산</tspan></text>
  <text x="580" y="581" text-anchor="middle" fill="#9c8e78" font-size="11.5">컨택: 네트워크(영순)·소모임 앱·콜드메일 / 분기 1회+</text>

  <text x="580" y="624" text-anchor="middle" fill="#6f6454" font-size="11.5">소문거리는 ‘더 나은 이야기’가 아니라 ‘선이 그어지는 다른 이야기’ · 2조 김서아·배영순·하지우·박지호</text>
