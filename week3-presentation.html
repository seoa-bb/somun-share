<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>소문설계 3주차 발표 — 글래스 코드 온(On) 트리</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0907;color:#f3ead9;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px;word-break:keep-all}
  .slide{width:100%;max-width:1160px;aspect-ratio:16/9;
    background:radial-gradient(120% 80% at 50% 16%, #2c2016 0%, #1a130c 48%, #0e0a07 100%);
    border:1px solid #3a2f20;border-radius:18px;box-shadow:0 26px 64px rgba(0,0,0,.6);overflow:hidden;position:relative}
  .slide:before{content:"";position:absolute;inset:0;background:radial-gradient(40% 30% at 50% 20%,rgba(216,177,95,.16),rgba(216,177,95,0) 70%);pointer-events:none}
  svg{width:100%;height:100%;display:block;position:relative}
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1160 652" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <!-- eyebrow + title -->
  <text x="580" y="56" text-anchor="middle" fill="#d8b15f" font-size="14" font-weight="800" letter-spacing="5">GLASS CODE · 온 ( O N )</text>
  <text x="580" y="100" text-anchor="middle" fill="#f3ead9" font-size="34" font-weight="850" letter-spacing="-1">취미 모임의 ‘호스트’를 통해 퍼뜨린다</text>
  <text x="580" y="130" text-anchor="middle" fill="#b6a890" font-size="15.5">핵심 타겟 한 명을 매체로 → 모임 전체로 (전염병식 확산)</text>

  <!-- connectors -->
  <g fill="none" stroke="#8a6f3f" stroke-width="2.5">
    <path d="M580,238 C580,300 235,290 235,360"/>
    <path d="M580,238 L580,360"/>
    <path d="M580,238 C580,300 925,290 925,360"/>
  </g>

  <!-- central node -->
  <circle cx="580" cy="186" r="52" fill="#1d160e" stroke="#d8b15f" stroke-width="2.5"/>
  <text x="580" y="180" text-anchor="middle" font-size="30">🍸</text>
  <text x="580" y="208" text-anchor="middle" fill="#e9c485" font-size="12.5" font-weight="800">싱글</text>
  <text x="580" y="262" text-anchor="middle" fill="#f3ead9" font-size="14.5" font-weight="800">타겟 · 자리 잡은 30~40 싱글</text>

  <!-- cards -->
  <!-- A -->
  <g>
    <rect x="95" y="360" width="280" height="120" rx="16" fill="#211910" stroke="#4a3c28" stroke-width="1.5"/>
    <circle cx="361" cy="360" r="15" fill="#d8b15f"/><text x="361" y="365" text-anchor="middle" fill="#221a12" font-size="15" font-weight="800">✓</text>
    <text x="120" y="400" fill="#f3ead9" font-size="20" font-weight="850">🤝 CEO 조찬모임</text>
    <text x="120" y="426" fill="#b6a890" font-size="14">그 안에서 골프·와인 분과로 또 나뉨</text>
    <text x="120" y="458" fill="#e9c485" font-size="13.5" font-weight="800">★ 배영순 대표 실제 네트워크</text>
  </g>
  <!-- B -->
  <g>
    <rect x="440" y="360" width="280" height="120" rx="16" fill="#211910" stroke="#4a3c28" stroke-width="1.5"/>
    <circle cx="706" cy="360" r="15" fill="#d8b15f"/><text x="706" y="365" text-anchor="middle" fill="#221a12" font-size="15" font-weight="800">✓</text>
    <text x="465" y="400" fill="#f3ead9" font-size="20" font-weight="850">📱 ‘소모임’ 앱</text>
    <text x="465" y="426" fill="#b6a890" font-size="14">취미로 호스트가 직접 여는 모임</text>
    <text x="465" y="458" fill="#b6a890" font-size="13.5">러닝·와인·골프 …</text>
  </g>
  <!-- C -->
  <g>
    <rect x="785" y="360" width="280" height="120" rx="16" fill="#211910" stroke="#4a3c28" stroke-width="1.5"/>
    <circle cx="1051" cy="360" r="15" fill="#d8b15f"/><text x="1051" y="365" text-anchor="middle" fill="#221a12" font-size="15" font-weight="800">✓</text>
    <text x="810" y="400" fill="#f3ead9" font-size="20" font-weight="850">⛳ 취미 동호회</text>
    <text x="810" y="426" fill="#b6a890" font-size="14">같은 취향끼리 모인 솔로 多</text>
    <text x="810" y="458" fill="#b6a890" font-size="13.5">골프·와인·러닝·스쿠버 …</text>
  </g>

  <!-- flow bar -->
  <rect x="95" y="512" width="970" height="60" rx="14" fill="#0f0b07" stroke="#d8b15f" stroke-width="1.2"/>
  <text x="580" y="540" text-anchor="middle" fill="#f3ead9" font-size="15.5" font-weight="800">각 모임의 <tspan fill="#e9c485">호스트(주최자)</tspan> → 협약(혜택 ↔ 단체방문·입소문·새 회원) → <tspan fill="#e9c485">모임 전체로 확산</tspan></text>
  <text x="580" y="561" text-anchor="middle" fill="#9c8e78" font-size="12.5">컨택: 네트워크(영순)·소모임 앱·콜드메일 / 분기 1회+</text>

  <!-- footer -->
  <text x="580" y="606" text-anchor="middle" fill="#7d7160" font-size="12.5">매스 = “잔으로 인연을 만드는 곳”을 검색·공간·사람 접점마다 · 2조 김서아·배영순·하지우·박지호</text>
</svg>
</div>
</body>
</html>
